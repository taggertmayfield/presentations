      <h1>Front Elevation Study <span>/ Late Afternoon</span></h1>
      <div class="meta">TM-RES-01 · SOUTH FACE · WOODED SITE</div>
    </div>
    <div class="art">
      <svg viewBox="0 0 1200 660" role="img" aria-label="Color architectural sketch of the stepped shed house, covered walk and garage in a wooded setting with a cedar tree at right">

            <stop offset="0.6" stop-color="#AFD2E6"/>
            <stop offset="1" stop-color="#93BEDA"/>
          </linearGradient>
          <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#F6DFAA"/>
            <stop offset="1" stop-color="#E9B968"/>
          </linearGradient>
          <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
