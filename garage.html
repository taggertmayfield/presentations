<!-- ============ SHEET A-1 : OVERALL PLAN (BLUEPRINT) ============ -->

    <text x="770" y="866" font-size="13" class="mono" fill="#9FC3F5">MAYFIELD RESIDENCE · RICHLAND CO, IL</text>

    <!-- garage door segments + width -->

    <line x1="582.5" y1="660" x2="582.5" y2="706"/><line x1="672.5" y1="660" x2="672.5" y2="706"/>
    <line x1="695" y1="660" x2="695" y2="706"/><line x1="785" y1="660" x2="785" y2="706"/>
    <line x1="807.5" y1="660" x2="807.5" y2="706"/><line x1="897.5" y1="660" x2="897.5" y2="706"/>
    <line x1="560" y1="694" x2="920" y2="694" marker-start="url(#arwB)" marker-end="url(#arwB)"/>
    <line x1="560" y1="730" x2="920" y2="730" marker-start="url(#arwB)" marker-end="url(#arwB)"/>
    <!-- recess / projection / overall depth, right -->
    <line x1="920" y1="440" x2="1030" y2="440"/><line x1="920" y1="540" x2="1030" y2="540"/><line x1="920" y1="660" x2="1030" y2="660"/>
    <line x1="962" y1="440" x2="962" y2="540" marker-start="url(#arwB)" marker-end="url(#arwB)"/>
    <line x1="962" y1="540" x2="962" y2="660" marker-start="url(#arwB)" marker-end="url(#arwB)"/>
    <line x1="1012" y1="440" x2="1012" y2="660" marker-start="url(#arwB)" marker-end="url(#arwB)"/>
  </g>
  <g font-size="13" class="mono" fill="#EAF2FF" text-anchor="middle">
    <text x="520" y="100">80'-0" EXIST. HOUSE</text>
    <text x="76" y="340" transform="rotate(-90 76 340)">40'-0" EXIST.</text>
    <text x="340" y="580">44'-0"</text>
    <text x="627.5" y="686" font-size="11">9'-0"</text>
    <text x="740" y="686" font-size="11">9'-0"</text>
    <text x="852.5" y="686" font-size="11">9'-0"</text>
    <text x="571" y="686" font-size="9">2'-3"</text>
    <text x="684" y="686" font-size="9">2'-3"</text>
    <text x="796" y="686" font-size="9">2'-3"</text>
    <text x="909" y="686" font-size="9">2'-3"</text>
    <text x="740" y="722">36'-0" GARAGE</text>
    <text x="950" y="490" transform="rotate(-90 950 490)" font-size="12">10'-0" IN</text>
    <text x="950" y="600" transform="rotate(-90 950 600)" font-size="12">12'-0" OUT</text>
    <text x="1024" y="550" transform="rotate(-90 1024 550)">22'-0"</text>
  </g>

  <!-- north arrow -->
  <g transform="translate(1002,80)" stroke="#EAF2FF" fill="none">
    <circle r="22" stroke-width="1.5"/>
    <path d="M0,14 L0,-14 M0,-14 L-6,-2 M0,-14 L6,-2" stroke-width="1.5"/>
    <text y="-30" text-anchor="middle" font-size="13" fill="#EAF2FF" stroke="none" class="mono">N</text>
  </g>

    <rect x="46" y="770" width="26" height="10" fill="url(#wallHatch)" stroke="#EAF2FF" stroke-width="1"/>
    <text x="80" y="779" fill="#EAF2FF">NEW CONSTRUCTION</text>
    <rect x="230" y="770" width="26" height="10" fill="#2A5CA0" stroke="#9FC3F5" stroke-width="1"/>
    <text x="264" y="779" fill="#EAF2FF">EXISTING</text>
    <rect x="360" y="770" width="26" height="10" fill="none" stroke="#9FC3F5" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="394" y="779" fill="#EAF2FF">REMOVED</text>
    <text x="46" y="800">GARAGE 36'-0" x 22'-0" · RECESSED 10'-0" INTO EXIST. HOUSE, 12'-0" PROJECTION · CLEAR DEPTH 20'-8" (PALISADE 196.7" + 4'-3") · V.I.F. EXIST. 1ST-FLR CLG ≥9'-2" FOR 8'-0" DOOR TRACK</text>
  </g>
</svg>
</div>

<!-- ============ SHEET A-2 : FRONT ELEVATION, HOUSE + GARAGE ============ -->
<!-- Scale: 11 px = 1 ft. Grade y=600. House x 100-980 (80'). Garage x 584-980 (36'),
     eave 10' (y490), peak 17' (y413, x782). House fascia 17' (y413), ridge ~24' (y336). -->
<div class="sheet">
<svg id="elev" viewBox="0 0 1080 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Front elevation, existing house with garage addition">
  <defs>
    <marker id="arwK" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L10,5 L0,9" fill="none" stroke="#6B5B45" stroke-width="1.6"/>
    </marker>
    <linearGradient id="stuccoG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFC49D"/><stop offset="1" stop-color="#BFB48D"/>
    </linearGradient>
    <linearGradient id="houseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B0AB85"/><stop offset="1" stop-color="#9C9770"/>
    </linearGradient>
    <linearGradient id="woodG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A96F3B"/><stop offset=".5" stop-color="#B87E45"/><stop offset="1" stop-color="#9C6534"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="800" fill="#F6F3EC"/>
  <rect x="18" y="18" width="1044" height="764" fill="none" stroke="#3B3226" stroke-width="2.5"/>
  <rect x="24" y="24" width="1032" height="752" fill="none" stroke="#3B3226" stroke-width="1"/>

  <!-- title block -->
  <g fill="#3B3226">
    <line x1="24" y1="716" x2="1056" y2="716" stroke="#3B3226" stroke-width="1.5"/>
    <text x="46" y="748" font-size="26" font-weight="700" letter-spacing="2">FRONT ELEVATION — HOUSE &amp; GARAGE ADDITION</text>
    <text x="46" y="766" font-size="13" class="mono" fill="#6B5B45">SCALE 1/8" = 1'-0" · EXIST. HEIGHTS V.I.F. · FINISHES MATCHED TO EXISTING</text>
    <text x="770" y="748" font-size="13" class="mono" fill="#6B5B45">SHEET A-2</text>
    <text x="770" y="766" font-size="13" class="mono" fill="#6B5B45">MAYFIELD RESIDENCE · RICHLAND CO, IL</text>
  </g>

  <!-- ===== EXISTING HOUSE (drawn first, garage overlaps) ===== -->
  <!-- roof band: side gable, ridge y336, fascia y413 -->
  <g>
    <rect x="89" y="336" width="902" height="71" fill="#8A8378" stroke="#5c574f" stroke-width="1"/>
    <g id="houseSeams" stroke="#6f6a60" stroke-width="1"></g>
    <rect x="89" y="330" width="902" height="7" rx="2" fill="#75705f" stroke="#5c574f" stroke-width="1"/>
    <rect x="89" y="407" width="902" height="8" fill="#4B3621"/>
    <!-- chimney -->
    <rect x="420" y="292" width="26" height="44" fill="#9C9770" stroke="#7d7860" stroke-width="1"/>
    <rect x="416" y="286" width="34" height="8" fill="#75705f"/>
  </g>
  <!-- house wall -->
  <rect x="100" y="415" width="880" height="185" fill="url(#houseG)" stroke="#7d7860" stroke-width="1.5"/>

  <!-- house windows & door (visible left 44') -->
  <g>
    <!-- upper story windows w/ shutters -->
    <g id="win1" transform="translate(150,432)">
      <rect x="-12" y="0" width="10" height="46" fill="#3a3128"/>
      <rect x="46" y="0" width="10" height="46" fill="#3a3128"/>
      <rect x="0" y="0" width="44" height="46" fill="#D7E5EC" stroke="#3a3128" stroke-width="3"/>
      <line x1="22" y1="0" x2="22" y2="46" stroke="#3a3128" stroke-width="2"/>
      <line x1="0" y1="23" x2="44" y2="23" stroke="#3a3128" stroke-width="2"/>
    </g>
    <use href="#win1" x="200"/>
    <!-- lower picture window -->
    <rect x="150" y="512" width="88" height="56" fill="#D7E5EC" stroke="#f2efe6" stroke-width="5"/>
    <line x1="194" y1="512" x2="194" y2="568" stroke="#f2efe6" stroke-width="4"/>
    <!-- entry door (dark blue) -->

    <circle cx="488" cy="564" r="2.5" fill="#c9b78a"/>
    <!-- small window near door -->
    <rect x="392" y="516" width="34" height="30" fill="#D7E5EC" stroke="#f2efe6" stroke-width="4"/>
  </g>
  <text x="290" y="466" font-size="12" class="mono" fill="#5c5540" text-anchor="middle" opacity="0"></text>

  <!-- ===== GARAGE ADDITION (in front, 12' projection) ===== -->
  <!-- side shadow to read projection -->
  <rect x="577" y="420" width="7" height="180" fill="#000" opacity="0.18"/>
  <!-- gable wall -->
  <polygon points="584,600 584,490 782,413 980,490 980,600" fill="url(#stuccoG)" stroke="#8a7d5e" stroke-width="1.5"/>
  <g id="stuccoTexture" opacity="0.35"></g>
  <!-- rake fascia / roof edge -->
  <g stroke-linejoin="round">
    <polygon points="567,497 782,413 997,497 997,508 782,424 567,508" fill="#4B3621" stroke="#33240f" stroke-width="1"/>
    <polygon points="567,493 782,409 997,493 997,498 782,414 567,498" fill="#8A8378" stroke="none"/>
    <rect x="770" y="398" width="24" height="12" rx="3" fill="#8A8378" stroke="#5c574f" stroke-width="1"/>
  </g>

  <g id="doors"></g>
  <g id="stones"></g>
  <g id="lanterns"></g>

  <!-- grade line -->
  <line x1="60" y1="600" x2="1020" y2="600" stroke="#3B3226" stroke-width="2.5"/>

  <!-- labels -->
  <text x="300" y="628" font-size="13" class="mono" fill="#6B5B45" text-anchor="middle">EXISTING RESIDENCE</text>
  <text x="782" y="628" font-size="13" class="mono" fill="#6B5B45" text-anchor="middle">GARAGE ADDITION — PROJECTS 12'-0"</text>

  <!-- dimensions -->
  <g stroke="#6B5B45" stroke-width="1.2" fill="none">
    <!-- garage eave / peak, right -->
    <line x1="980" y1="490" x2="1040" y2="490"/><line x1="782" y1="413" x2="1040" y2="413"/><line x1="1002" y1="600" x2="1040" y2="600"/>
    <line x1="1008" y1="490" x2="1008" y2="600" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
    <line x1="1032" y1="413" x2="1032" y2="600" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
    <!-- house ridge, left -->
    <line x1="89" y1="336" x2="48" y2="336"/><line x1="80" y1="600" x2="48" y2="600"/>
    <line x1="58" y1="336" x2="58" y2="600" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
    <!-- door height -->
    <line x1="608.75" y1="512" x2="545" y2="512"/>
    <line x1="556" y1="512" x2="556" y2="600" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
    <!-- widths below grade -->
    <line x1="100" y1="606" x2="100" y2="694"/><line x1="584" y1="606" x2="584" y2="672"/><line x1="980" y1="606" x2="980" y2="694"/>
    <line x1="584" y1="660" x2="980" y2="660" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
    <line x1="100" y1="684" x2="980" y2="684" marker-start="url(#arwK)" marker-end="url(#arwK)"/>
  </g>
  <g font-size="13" class="mono" fill="#3B3226" text-anchor="middle">
    <text x="1020" y="546" transform="rotate(-90 1020 546)">10'-0" EAVE</text>
    <text x="1044" y="508" transform="rotate(-90 1044 508)">17'-0" PEAK</text>
    <text x="46" y="470" transform="rotate(-90 46 470)">EXIST. RIDGE ±24'-0" V.I.F.</text>
    <text x="546" y="558" transform="rotate(-90 546 558)" font-size="12">8'-0"</text>
    <text x="782" y="654" font-size="12">36'-0" ADDITION</text>
    <text x="540" y="700" font-size="12">80'-0" EXIST. HOUSE</text>
  </g>

  <script><![CDATA[
  (function(){
    const NS='http://www.w3.org/2000/svg';
    const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
    let seed=7; const rnd=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};

    // house roof standing seams
    const seams=document.getElementById('houseSeams');
    for(let x=110;x<985;x+=22) seams.appendChild(el('line',{x1:x,y1:337,x2:x,y2:406}));

    // ---- carriage doors (9'x8' @ 11px/ft): x positions of openings ----
    const doors=document.getElementById('doors');
    [608.75,732.5,856.25].forEach(x=>{
      const g=el('g',{}), w=99, top=512, bot=600;
      g.appendChild(el('rect',{x:x-4,y:top-4,width:w+8,height:bot-top+4,fill:'#7C4A22'}));
      g.appendChild(el('rect',{x:x,y:top,width:w,height:bot-top,fill:'url(#woodG)',stroke:'#6e4520','stroke-width':1.2}));
      for(let px=x+8;px<x+w;px+=8) g.appendChild(el('line',{x1:px,y1:top,x2:px,y2:bot,stroke:'#8a5a2c','stroke-width':0.6,opacity:0.6}));
      // top lite band, 4 panes
      g.appendChild(el('rect',{x:x+4,y:top+4,width:w-8,height:20,fill:'#6e4520'}));
      for(let i=0;i<4;i++) g.appendChild(el('rect',{x:x+7+i*22.5,y:top+6.5,width:17,height:15,fill:'#D7E5EC',stroke:'#43301c','stroke-width':1.2}));
      // mid rail
      g.appendChild(el('rect',{x:x+1,y:top+27,width:w-2,height:4,fill:'#8a5a2c'}));
      // X braces on each half
      const y1=top+34, y2=bot-4;
      [[x+3,x+w/2-2],[x+w/2+2,x+w-3]].forEach(([a,b])=>{
        g.appendChild(el('line',{x1:a,y1:y1,x2:b,y2:y2,stroke:'#7C4A22','stroke-width':4.5,'stroke-linecap':'round'}));
        g.appendChild(el('line',{x1:b,y1:y1,x2:a,y2:y2,stroke:'#7C4A22','stroke-width':4.5,'stroke-linecap':'round'}));
      });
      g.appendChild(el('rect',{x:x+w/2-2,y:top+27,width:4,height:bot-top-27,fill:'#6e4520'}));
      g.appendChild(el('rect',{x:x+w/2-11,y:top+44,width:5.5,height:15,rx:2,fill:'#1d1d1d'}));
      g.appendChild(el('rect',{x:x+w/2+5.5,y:top+44,width:5.5,height:15,rx:2,fill:'#1d1d1d'}));
      doors.appendChild(g);
    });

    // ---- stone wainscot on garage piers (grade 600 up to ~560) ----
    const stones=document.getElementById('stones');
    [[584,24.75],[707.75,24.75],[831.5,24.75],[955.25,24.75]].forEach(([sx,sw])=>{
      stones.appendChild(el('rect',{x:sx,y:558,width:sw,height:42,fill:'#A79C82',stroke:'#8F856E','stroke-width':1}));
      stones.appendChild(el('rect',{x:sx-2,y:553,width:sw+4,height:6,fill:'#9a8f76',stroke:'#7d7460','stroke-width':1}));
      for(let row=0;row<3;row++){
        let cx=sx+1.5;
        while(cx<sx+sw-3){
          const w=6+rnd()*9, h=9+rnd()*4;
          const shade=['#B3A88F','#A89C80','#BCB199','#9E9378'][Math.floor(rnd()*4)];
          stones.appendChild(el('rect',{x:cx,y:561+row*13,width:Math.min(w,sx+sw-1.5-cx),height:h,rx:3,fill:shade,stroke:'#7d7460','stroke-width':0.7}));
          cx+=w+2;
        }
      }
    });

    // ---- lanterns on outer piers ----
    const lan=document.getElementById('lanterns');
    [596.5,967.5].forEach(cx=>{
      const g=el('g',{});
      g.appendChild(el('line',{x1:cx,y1:478,x2:cx,y2:484,stroke:'#111','stroke-width':2.5}));
      g.appendChild(el('polygon',{points:`${cx-8},490 ${cx+8},490 ${cx+5},484 ${cx-5},484`,fill:'#111'}));
      g.appendChild(el('rect',{x:cx-6,y:490,width:12,height:17,fill:'#F2DFA7',stroke:'#111','stroke-width':2}));
      g.appendChild(el('line',{x1:cx,y1:490,x2:cx,y2:507,stroke:'#111','stroke-width':1.2}));
      g.appendChild(el('circle',{cx:cx,cy:510,r:2.2,fill:'#111'}));
      lan.appendChild(g);
    });

    // ---- stucco texture on garage gable ----
    const tex=document.getElementById('stuccoTexture');
    for(let i=0;i<220;i++){
      const px=588+rnd()*388, py=425+rnd()*172;
      const roofY=413+Math.abs(px-782)*(77/198);

      const overDoor=(px>604&&px<712&&py>506)||(px>728&&px<836&&py>506)||(px>852&&px<960&&py>506);
      if(overDoor) continue;
      tex.appendChild(el('circle',{cx:px,cy:py,r:0.8,fill:'#9d9170'}));
    }
  })();
